<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Aura Align | Invisalign Consultation, Phone, Email, Map</title>
  <meta name="description" content="Contact page with lead form, map placeholder, phone, email, WhatsApp, and clinic hours.">
  <meta property="og:title" content="Contact Aura Align">
  <meta property="og:description" content="Call, message, or book an Invisalign consultation.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://images.unsplash.com/photo-1629909613654-28e377c37b09?auto=format&fit=crop&w=1200&q=80">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"ContactPage","name":"Contact Aura Align"}</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script defer src="assets/js/main.js"></script>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="page-hero">
      <div class="site-shell max-w-4xl">
        <p class="page-kicker">Contact</p>
        <h1 class="section-title mt-4">Make it easy to ask the first question.</h1>
        <p class="section-copy mt-5">Lead form, direct phone, email, WhatsApp, and map cues for local conversion.</p>
      </div>
    </section>

    <section class="section bg-white">
      <div class="site-shell grid gap-8 lg:grid-cols-[1fr_.9fr]">
        <form class="lux-card p-6">
          <h2 class="text-2xl font-black">Send a message</h2>
          <div class="mt-5 grid gap-3 sm:grid-cols-2">
            <input class="form-field" placeholder="First name" aria-label="First name">
            <input class="form-field" placeholder="Last name" aria-label="Last name">
            <input class="form-field" type="email" placeholder="Email" aria-label="Email">
            <input class="form-field" type="tel" placeholder="Phone" aria-label="Phone">
            <select class="form-field sm:col-span-2" aria-label="Reason for contacting"><option>Invisalign consultation</option><option>Financing question</option><option>Insurance question</option><option>Existing patient</option></select>
            <textarea class="form-field sm:col-span-2" rows="5" placeholder="How can we help?" aria-label="Message"></textarea>
          </div>
          <button class="btn btn-primary mt-5" type="button">Submit request</button>
        </form>
        <div class="grid gap-5">
          <div class="lux-card p-6"><h2 class="text-xl font-black">Call or text</h2><p class="mt-2 text-slate-600">(555) 019-0111</p><a class="btn btn-secondary mt-4" href="https://wa.me/15550190111">Open WhatsApp</a></div>
          <div class="lux-card p-6"><h2 class="text-xl font-black">Email</h2><p class="mt-2 text-slate-600">hello@auraalign.example</p></div>
          <div class="lux-card overflow-hidden"><div class="grid h-64 place-items-center bg-[#dcecf2] text-center font-black text-slate-600">Map placeholder<br>Embed Google Maps here</div></div>
        </div>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
</body>
</html>
